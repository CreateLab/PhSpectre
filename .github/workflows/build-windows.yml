name: Build — Windows

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore PhSpectre.App/PhSpectre.App.csproj

      - name: Publish
        run: >-
          dotnet publish PhSpectre.App/PhSpectre.App.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/windows

      - name: Move release tag
        if: github.event_name == 'push'
        run: |
          git tag -f latest-windows
          git push origin latest-windows --force

      - name: Create or update release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-windows
          name: "Latest — Windows x64"
          body: |
            Automated build · commit ${{ github.sha }}
          prerelease: true
          files: publish/windows/PhSpectre.App.exe
